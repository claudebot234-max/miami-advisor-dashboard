<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Agents - OpenClaw Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a12;overflow:hidden;font-family:-apple-system,sans-serif;color:#e0e0f0}
#wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column}

/* Top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#12121e;border-bottom:2px solid #1e1e32;z-index:10;flex-shrink:0}
.topbar h1{font-family:'Press Start 2P',monospace;font-size:12px;color:#4f8ef7;text-shadow:0 0 10px rgba(79,142,247,0.4)}
.topbar .sep{width:1px;height:20px;background:#2a2a3e;margin:0 4px}
.stat{text-align:center;padding:0 10px}
.stat .n{font-family:'Press Start 2P',monospace;font-size:14px}
.stat .l{font-size:9px;color:#6a6a8a;margin-top:2px}
.n.ok{color:#34d399}.n.err{color:#f87171}.n.idle{color:#fbbf24}.n.run{color:#c084fc}.n.tot{color:#4f8ef7}
.topbar .spacer{flex:1}
.btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:8px 16px;border:2px solid #2a2a3e;border-radius:4px;background:#12121e;color:#e0e0f0;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:#4f8ef7;color:#4f8ef7}
.btn.active{border-color:#c084fc;color:#c084fc;background:rgba(192,132,252,0.1)}
.btn.danger{border-color:#f87171;color:#f87171}
.back{font-size:10px;color:#6a6a8a;text-decoration:none;padding:6px 10px;border:1px solid #2a2a3e;border-radius:4px}
.back:hover{color:#4f8ef7;border-color:#4f8ef7}

/* Canvas */
#game-wrap{flex:1;position:relative;overflow:hidden;cursor:default}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* Agent info panel */
#info{position:absolute;top:0;right:-360px;width:350px;height:100%;background:#12121eee;border-left:2px solid #2a2a3e;padding:20px;overflow-y:auto;transition:right .3s ease;z-index:20}
#info.open{right:0}
#info h3{font-family:'Press Start 2P',monospace;font-size:10px;color:#4f8ef7;margin-bottom:16px}
#info .close{position:absolute;top:12px;right:12px;font-size:18px;color:#6a6a8a;cursor:pointer;background:none;border:none}
#info .close:hover{color:#f87171}
.info-sprite{text-align:center;margin-bottom:16px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e1e32;font-size:13px}
.info-row .k{color:#6a6a8a}.info-row .v{color:#e0e0f0;font-weight:500;text-align:right;max-width:60%}
.info-row .v.err-text{color:#f87171}
.info-row .v.ok-text{color:#34d399}
.personality{margin-top:16px;padding:12px;background:#1a1a2e;border-radius:6px;font-size:12px;line-height:1.6;color:#a0a0c0}
.personality b{color:#e0e0f0}

/* Tooltip */
#tooltip{position:absolute;pointer-events:none;background:#12121ef0;border:2px solid #4f8ef7;border-radius:4px;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:8px;color:#e0e0f0;white-space:nowrap;z-index:30;display:none}

/* Speed controls */
.speed-ctrl{display:flex;align-items:center;gap:4px;font-size:9px;color:#6a6a8a}
.speed-ctrl button{width:28px;height:28px;font-size:12px;border:1px solid #2a2a3e;background:#12121e;color:#e0e0f0;border-radius:4px;cursor:pointer}
.speed-ctrl button.active{border-color:#4f8ef7;color:#4f8ef7}
</style>
</head>

    <a href="index.html" class="back">&lt; Dashboard</a>

    <div class="stat"><div class="n idle" id="s-idle">0</div><div class="l">IDLE</div></div>
    <div class="spacer"></div>
    <div class="speed-ctrl">
      SPD:
      <button onclick="setSpeed(0.5)">&#189;</button>
      <button class="active" onclick="setSpeed(1)">1</button>
      <button onclick="setSpeed(2)">2</button>
    </div>
    <div class="sep"></div>
    <button class="btn" id="scrum-btn" onclick="callScrum()">CALL SCRUM</button>
    <button class="btn" onclick="sendCoffeeBreak()">COFFEE BREAK</button>
  </div>
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <div id="info">
      <button class="close" onclick="closeInfo()">&times;</button>
      <div id="info-body"></div>
    </div>
    <div id="tooltip"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const PX = 4; // pixels per game-pixel
const GW = 320, GH = 180; // game world size
const SW = GW * PX, SH = GH * PX; // screen size

// ═══════════════════════════════════════════════════
// OFFICE LAYOUT (in game pixels)
// ═══════════════════════════════════════════════════
const FLOOR_COLOR = '#2a1f14';
const FLOOR_TILE1 = '#2a1f14';
const FLOOR_TILE2 = '#2e2318';
const WALL_COLOR = '#3a3050';
const WALL_TOP = '#4a4060';
const WINDOW_COLOR = '#1a3050';
const WINDOW_LIGHT = '#2a5080';
const DESK_COLOR = '#5a4530';
const DESK_TOP = '#6a5540';
const MONITOR_ON = '#2040a0';
const MONITOR_SCREEN = '#304880';
const CHAIR_COLOR = '#404050';
const CARPET_COLOR = '#1e1628';
const MEETING_FLOOR = '#1a1425';
const KITCHEN_FLOOR = '#1e1a14';
const PLANT_POT = '#5a3a20';
const PLANT_GREEN = '#2a7a3a';
const PLANT_LIGHT = '#3a9a4a';
const COUCH_COLOR = '#3a2a50';
const COUCH_CUSHION = '#4a3a60';
const BOOKSHELF = '#4a3520';
const WHITEBOARD = '#c0c0d0';

// Desk positions (game coords) - 4 rows × 8 cols
const DESK_ROWS = 4, DESK_COLS = 8;
const DESK_W = 13, DESK_H = 7;
const DESK_START_X = 90, DESK_START_Y = 14;
const DESK_GAP_X = 2, DESK_GAP_Y = 14;
const DESK_BLOCK_GAP = 10; // extra gap between left 4 and right 4

const DESKS = [];
for (let r = 0; r < DESK_ROWS; r++) {
  for (let c = 0; c < DESK_COLS; c++) {
    const blockOffset = c >= 4 ? DESK_BLOCK_GAP : 0;
    DESKS.push({
      x: DESK_START_X + c * (DESK_W + DESK_GAP_X) + blockOffset,
      y: DESK_START_Y + r * (DESK_H + DESK_GAP_Y),
      row: r, col: c
    });
  }
}

// Chair position relative to desk: centered below
const chairOffset = { x: 4, y: DESK_H + 1 };

// Key locations
const MEETING_ROOM = { x: 4, y: 4, w: 68, h: 56 };
const MEETING_TABLE = { x: 18, y: 18, w: 38, h: 16 };
const MEETING_DOOR = { x: 68, y: 34, w: 4, h: 12 };
const KITCHEN = { x: 230, y: 118, w: 86, h: 58 };
const COFFEE_MACHINE = { x: 242, y: 122 };
const FRIDGE_POS = { x: 300, y: 122 };
const WATER_COOLER = { x: 260, y: 122 };
const KITCHEN_TABLE = { x: 260, y: 148, w: 26, h: 12 };
const LOUNGE = { x: 4, y: 90, w: 72, h: 86 };
const COUCH_POS = { x: 10, y: 130, w: 40, h: 14 };
const PLANTS = [
  { x: 82, y: 6 }, { x: 82, y: 60 }, { x: 82, y: 100 },
  { x: 4, y: 66 }, { x: 62, y: 66 },
  { x: 220, y: 120 }, { x: 315, y: 6 },
  { x: 315, y: 60 }, { x: 315, y: 100 },
  { x: 150, y: 100 }, { x: 200, y: 100 },

// Meeting spots for scrum (positions inside meeting room)
const MEETING_SPOTS = [];
for (let i = 0; i < 36; i++) {
  MEETING_SPOTS.push({
    x: MEETING_ROOM.x + 8 + (i % 6) * 9,

}

// ═══════════════════════════════════════════════════
// AGENT TYPES & PERSONALITIES
// ═══════════════════════════════════════════════════
const AGENT_TYPES = {
  leads:         { label: 'Scout',      shirt: '#4080d0', accent: '#60a0f0', pants: '#2a3a5a', hair: '#5a3a20', speed: 1.2, social: 0.4, deskTime: 0.5, coffeeFreq: 0.3, personality: 'Energetic scanner. Always first to spot a new lead. Walks fast, talks faster.' },
  cpa:           { label: 'Accountant', shirt: '#30a070', accent: '#50c090', pants: '#2a4a3a', hair: '#1a1a2a', speed: 0.7, social: 0.3, deskTime: 0.8, coffeeFreq: 0.2, personality: 'Methodical and precise. Double-checks everything. Prefers spreadsheets to small talk.' },
  vul:           { label: 'Insurer',    shirt: '#8060b0', accent: '#a080d0', pants: '#3a2a5a', hair: '#4a3020', speed: 0.8, social: 0.5, deskTime: 0.6, coffeeFreq: 0.3, personality: 'Calm and collected. Speaks in actuarial tables. Secretly a thrill-seeker.' },
  acquisition:   { label: 'Hunter',     shirt: '#c08030', accent: '#e0a050', pants: '#4a3a20', hair: '#d0a040', speed: 1.4, social: 0.6, deskTime: 0.3, coffeeFreq: 0.4, personality: 'Bold dealmaker. Always on the hunt. Gets restless sitting at a desk.' },
  estate:        { label: 'Attorney',   shirt: '#4050a0', accent: '#6070c0', pants: '#2a2a40', hair: '#808090', speed: 0.6, social: 0.3, deskTime: 0.7, coffeeFreq: 0.2, personality: 'Dignified and deliberate. Never rushes. Quotes case law at the coffee machine.' },
  indian:        { label: 'Networker',  shirt: '#d06030', accent: '#f08050', pants: '#4a2a1a', hair: '#1a1a2a', speed: 1.0, social: 0.9, deskTime: 0.3, coffeeFreq: 0.4, personality: 'The office social butterfly. Knows everyone. Always planning the next event.' },
  linkedin:      { label: 'Publisher',  shirt: '#2070b0', accent: '#3090d0', pants: '#1a2a4a', hair: '#4a3020', speed: 0.8, social: 0.4, deskTime: 0.7, coffeeFreq: 0.3, personality: 'Content machine. Drafts posts while walking. Has opinions about engagement metrics.' },
  divorce:       { label: 'Monitor',    shirt: '#c04080', accent: '#e060a0', pants: '#4a1a3a', hair: '#2a1a2a', speed: 0.9, social: 0.3, deskTime: 0.6, coffeeFreq: 0.2, personality: 'Vigilant observer. Notices everything. Keeps detailed records of all filings.' },
  're-investor': { label: 'Investor',   shirt: '#20a080', accent: '#40c0a0', pants: '#1a3a30', hair: '#3a2a1a', speed: 1.0, social: 0.5, deskTime: 0.5, coffeeFreq: 0.3, personality: 'Sharp eye for deals. Reads The Real Deal religiously. Always calculating ROI.' },
  'warm-intros': { label: 'Connector',  shirt: '#d0a020', accent: '#f0c040', pants: '#4a3a10', hair: '#a03010', speed: 1.0, social: 1.0, deskTime: 0.2, coffeeFreq: 0.5, personality: 'Born networker. Never met a stranger. The office insists they invented the warm handshake.' },
  filly:         { label: 'Booker',     shirt: '#20a0a0', accent: '#40c0c0', pants: '#1a3a3a', hair: '#1a1a2a', speed: 0.9, social: 0.5, deskTime: 0.5, coffeeFreq: 0.4, personality: 'Phone wizard. Can book a meeting in 30 seconds flat. Always has headphones on.' },
  zoominfo:      { label: 'Scraper',    shirt: '#7040c0', accent: '#9060e0', pants: '#2a1a4a', hair: '#2a2a3a', speed: 1.1, social: 0.2, deskTime: 0.8, coffeeFreq: 0.2, personality: 'Data obsessed. Hunched over monitors. Speaks in APIs and enrichment scores.' },
  intel:         { label: 'Spy',        shirt: '#506070', accent: '#708090', pants: '#2a3040', hair: '#2a2a3a', speed: 1.0, social: 0.2, deskTime: 0.5, coffeeFreq: 0.2, personality: 'Mysterious and quiet. Appears out of nowhere with critical intel. Loves dark mode.' },
  pipeline:      { label: 'Foreman',    shirt: '#b09020', accent: '#d0b040', pants: '#3a3010', hair: '#4a3020', speed: 0.9, social: 0.6, deskTime: 0.4, coffeeFreq: 0.3, personality: 'The manager. Keeps everyone on track. Loves status updates and weekly digests.' },
  misc:          { label: 'Agent',      shirt: '#607080', accent: '#8090a0', pants: '#2a3040', hair: '#3a3040', speed: 0.8, social: 0.4, deskTime: 0.5, coffeeFreq: 0.3, personality: 'Reliable all-rounder. Gets the job done without drama.' },
};
const SKIN = '#e8b888';
const SKIN_SHADOW = '#c89868';
const EYE_COLOR = '#1a1a2a';
const MOUTH_COLOR = '#c06048';
const SHOE_COLOR = '#2a2020';

// ═══════════════════════════════════════════════════
// SPRITE DEFINITIONS (10w × 14h, character codes)
// ═══════════════════════════════════════════════════
// . = transparent, h = hair, s = skin, e = eye, m = mouth
// t = shirt, a = accent, p = pants, o = shoes, d = skin shadow
const SPRITES = {
  stand: [
    '...hhhh...',
    '..hhhhhh..',
    '..hssssh..',
    '..seesed..',
    '..sssssd..',
    '...smms...',
    '....ss....',
    '..tttttt..',
    '.tttaattt.',
    '..tttttt..',
    '...tttt...',
    '...pppp...',
    '...pp.pp..',
    '..oo..oo..',
  ],
  walk1: [
    '...hhhh...',
    '..hhhhhh..',
    '..hssssh..',
    '..seesed..',
    '..sssssd..',
    '...smms...',
    '....ss....',
    '..tttttt..',
    '.tttaattt.',
    '..tttttt..',
    '...tttt...',
    '...pppp...',
    '..pp...pp.',
    '.oo....oo.',
  ],
  walk2: [
    '...hhhh...',
    '..hhhhhh..',
    '..hssssh..',
    '..seesed..',
    '..sssssd..',
    '...smms...',
    '....ss....',
    '..tttttt..',
    '.tttaattt.',
    '..tttttt..',
    '...tttt...',
    '...pppp...',
    '.pp...pp..',
    'oo....oo..',
  ],
  sit: [
    '...hhhh...',
    '..hhhhhh..',
    '..hssssh..',
    '..seesed..',
    '..sssssd..',
    '...smms...',
    '....ss....',
    '..tttttt..',
    '.tttaattt.',
    '..tttttt..',
    '..tppppt..',
    '..pppppp..',
    '..........',
    '..........',
  ],
  stress: [
    '...hhhh...',
    '..hhhhhh..',
    '..hssssh..',
    '..sddsdd..',
    '..sssssd..',
    '...sdds...',
    '....ss....',
    '..tttttt..',
    '.tssttss..',
    '..tttttt..',
    '...tttt...',
    '...pppp...',
    '...pp.pp..',
    '..oo..oo..',
  ],
};

// ═══════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = SW;
canvas.height = SH;

// Offscreen canvas for background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = SW;
bgCanvas.height = SH;
const bgCtx = bgCanvas.getContext('2d');

// Sprite cache
const spriteCache = {};

function resizeCanvas() {
  const wrap = document.getElementById('game-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const scale = Math.min(w / SW, h / SH);
  canvas.style.width = (SW * scale) + 'px';
  canvas.style.height = (SH * scale) + 'px';
  canvas.style.marginLeft = ((w - SW * scale) / 2) + 'px';
  canvas.style.marginTop = ((h - SH * scale) / 2) + 'px';
  canvas._scale = scale;
  canvas._offsetX = (w - SW * scale) / 2;
  canvas._offsetY = (h - SH * scale) / 2;
}
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════
// SPRITE RENDERING
// ═══════════════════════════════════════════════════
function renderSprite(spriteData, colors, flip) {
  const w = spriteData[0].length, h = spriteData.length;
  const c = document.createElement('canvas');
  c.width = w * PX;
  c.height = h * PX;
  const cx = c.getContext('2d');
  for (let row = 0; row < h; row++) {
    for (let col = 0; col < w; col++) {
      const ch = spriteData[row][flip ? (w - 1 - col) : col];
      const color = colors[ch];
      if (color) {
        cx.fillStyle = color;
        cx.fillRect(col * PX, row * PX, PX, PX);
      }
    }
  }
  return c;
}

function buildSpriteSet(typeKey) {
  const t = AGENT_TYPES[typeKey] || AGENT_TYPES.misc;
  const colors = {
    'h': t.hair, 's': SKIN, 'd': SKIN_SHADOW, 'e': EYE_COLOR,
    'm': MOUTH_COLOR, 't': t.shirt, 'a': t.accent,
    'p': t.pants, 'o': SHOE_COLOR, '.': null
  };
  const set = {};
  for (const [name, data] of Object.entries(SPRITES)) {
    set[name + '_r'] = renderSprite(data, colors, false);
    set[name + '_l'] = renderSprite(data, colors, true);
  }
  return set;
}

function getSprites(typeKey) {
  if (!spriteCache[typeKey]) spriteCache[typeKey] = buildSpriteSet(typeKey);
  return spriteCache[typeKey];
}

// ═══════════════════════════════════════════════════
// DRAW OFFICE BACKGROUND
// ═══════════════════════════════════════════════════
function drawBg() {
  const c = bgCtx;
  // Floor tiles
  for (let gy = 0; gy < GH; gy++) {
    for (let gx = 0; gx < GW; gx++) {
      c.fillStyle = (gx + gy) % 2 === 0 ? FLOOR_TILE1 : FLOOR_TILE2;
      c.fillRect(gx * PX, gy * PX, PX, PX);
    }
  }

  const fill = (x, y, w, h, color) => { c.fillStyle = color; c.fillRect(x*PX,y*PX,w*PX,h*PX); };
  const stroke = (x, y, w, h, color) => {
    fill(x,y,w,1,color); fill(x,y+h-1,w,1,color);
    fill(x,y,1,h,color); fill(x+w-1,y,1,h,color);
  };

  // ── Meeting Room ──
  fill(MEETING_ROOM.x, MEETING_ROOM.y, MEETING_ROOM.w, MEETING_ROOM.h, MEETING_FLOOR);
  stroke(MEETING_ROOM.x, MEETING_ROOM.y, MEETING_ROOM.w, MEETING_ROOM.h, WALL_COLOR);
  // Glass walls (dashed)
  for (let i = 0; i < MEETING_ROOM.h; i += 3) {
    fill(MEETING_ROOM.x + MEETING_ROOM.w - 1, MEETING_ROOM.y + i, 1, 2, '#3a3a5a');
  }
  // Door opening
  fill(MEETING_DOOR.x, MEETING_DOOR.y, MEETING_DOOR.w, MEETING_DOOR.h, MEETING_FLOOR);
  // Meeting table
  fill(MEETING_TABLE.x, MEETING_TABLE.y, MEETING_TABLE.w, MEETING_TABLE.h, DESK_COLOR);
  fill(MEETING_TABLE.x+1, MEETING_TABLE.y+1, MEETING_TABLE.w-2, MEETING_TABLE.h-2, DESK_TOP);
  // Chairs around table
  for (let i = 0; i < 6; i++) {
    fill(MEETING_TABLE.x + 3 + i*6, MEETING_TABLE.y - 3, 4, 3, CHAIR_COLOR);
    fill(MEETING_TABLE.x + 3 + i*6, MEETING_TABLE.y + MEETING_TABLE.h, 4, 3, CHAIR_COLOR);
  }
  // Whiteboard
  fill(MEETING_ROOM.x + 2, MEETING_ROOM.y + 1, 20, 2, WHITEBOARD);
  fill(MEETING_ROOM.x + 3, MEETING_ROOM.y + 1, 18, 1, '#a0a0b0');
  // Label
  c.fillStyle = '#3a3a5a';
  c.font = '8px sans-serif';
  c.fillText('MEETING', (MEETING_ROOM.x+14)*PX, (MEETING_ROOM.y + MEETING_ROOM.h - 3)*PX);

  // ── Top wall with windows ──
  fill(0, 0, GW, 3, WALL_COLOR);
  fill(0, 1, GW, 1, WALL_TOP);
  for (let wx = 90; wx < GW - 10; wx += 30) {
    fill(wx, 0, 18, 2, WINDOW_COLOR);
    fill(wx+1, 0, 16, 1, WINDOW_LIGHT);
    // Window frame
    fill(wx+8, 0, 2, 2, WALL_COLOR);
  }
  // Side walls
  fill(0, 0, 2, GH, WALL_COLOR);
  fill(GW-2, 0, 2, GH, WALL_COLOR);
  fill(0, GH-2, GW, 2, WALL_COLOR);

  // ── Desks & Monitors ──
  for (const d of DESKS) {
    // Desk surface
    fill(d.x, d.y, DESK_W, DESK_H, DESK_COLOR);
    fill(d.x+1, d.y+1, DESK_W-2, DESK_H-2, DESK_TOP);
    // Monitor
    fill(d.x + 4, d.y + 1, 6, 4, '#1a1a2a');
    fill(d.x + 5, d.y + 1, 4, 3, MONITOR_SCREEN);
    // Monitor stand
    fill(d.x + 6, d.y + 4, 2, 1, '#1a1a2a');
    // Chair
    fill(d.x + chairOffset.x, d.y + chairOffset.y, 5, 4, CHAIR_COLOR);
    fill(d.x + chairOffset.x + 1, d.y + chairOffset.y, 3, 3, '#505060');
  }

  // ── Kitchen Area ──
  fill(KITCHEN.x, KITCHEN.y, KITCHEN.w, KITCHEN.h, KITCHEN_FLOOR);
  stroke(KITCHEN.x, KITCHEN.y, KITCHEN.w, KITCHEN.h, '#2a2a20');
  // Counter
  fill(KITCHEN.x + 4, KITCHEN.y + 2, KITCHEN.w - 8, 6, '#4a3a28');
  fill(KITCHEN.x + 5, KITCHEN.y + 3, KITCHEN.w - 10, 4, '#5a4a38');

// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════
const particles = [];
function addParticle(x, y, type, duration) {
  particles.push({ x, y, type, life: duration, maxLife: duration, vx: 0, vy: -0.3 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha * 0.6;
    if (p.type === 'steam') {
      ctx.fillStyle = '#a0a0b0';
      ctx.fillRect(p.x * PX, p.y * PX, PX, PX);
    } else if (p.type === 'zzz') {
      ctx.fillStyle = '#6a6aaa';
      ctx.font = `${PX * 3}px 'Press Start 2P', monospace`;
      ctx.fillText('z', p.x * PX, p.y * PX);
    }
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════
// AGENT CLASS
// ═══════════════════════════════════════════════════
let agents = [];
let scrumActive = false;
let scrumTimer = 0;
let gameSpeed = 1;

class Agent {
  constructor(data, index) {
    this.data = data;
    this.index = index;
    this.desk = DESKS[index % DESKS.length];
    this.category = data.category || 'misc';
    this.type = AGENT_TYPES[this.category] || AGENT_TYPES.misc;
    this.sprites = getSprites(this.category);
    this.name = data.name;
    this.jobStatus = data.status; // completed, error, idle, running

    // Position
    this.x = this.desk.x + chairOffset.x;
    this.y = this.desk.y + chairOffset.y;
    this.targetX = this.x;
    this.targetY = this.y;
    this.facing = 'r'; // r or l

    // State machine
    this.state = this.jobStatus === 'error' ? 'stressed' : 'working';
    this.stateTimer = 2 + Math.random() * 5;
    this.animFrame = 0;
    this.animTimer = 0;

    // Bubble
    this.bubble = null;
    this.bubbleTimer = 0;

    // Offset for idle bob
    this.bobPhase = Math.random() * Math.PI * 2;
  }

  setTarget(x, y) {
    this.targetX = Math.max(4, Math.min(GW - 14, x));
    this.targetY = Math.max(4, Math.min(GH - 16, y));
    if (this.targetX > this.x + 2) this.facing = 'r';
    else if (this.targetX < this.x - 2) this.facing = 'l';
    this.state = 'walking';
  }

  goToDesk() {
    this.setTarget(this.desk.x + chairOffset.x, this.desk.y + chairOffset.y);
    this._nextState = this.jobStatus === 'error' ? 'stressed' : 'working';
  }

  goToCoffee() {
    const jitter = (Math.random() - 0.5) * 10;
    this.setTarget(COFFEE_MACHINE.x + jitter, COFFEE_MACHINE.y + 10);
    this._nextState = 'coffee';
    this.bubble = '☕';
    this.bubbleTimer = 3;
  }

  goToWander() {
    const targets = [
      ...PLANTS.map(p => ({ x: p.x + 3, y: p.y + 8 })),
      { x: WATER_COOLER.x, y: WATER_COOLER.y + 10 },
      { x: COUCH_POS.x + 15, y: COUCH_POS.y - 4 },
      { x: LOUNGE.x + 20 + Math.random()*30, y: LOUNGE.y + 20 + Math.random()*30 },
      { x: 100 + Math.random() * 150, y: 105 + Math.random() * 30 },
    ];
    const t = targets[Math.floor(Math.random() * targets.length)];
    this.setTarget(t.x, t.y);
    this._nextState = 'idle';
  }

  goToChat() {
    // Find a nearby agent to chat with
    const others = agents.filter(a => a !== this && a.state !== 'walking' && a.state !== 'meeting');
    if (others.length === 0) return this.goToWander();
    const target = others[Math.floor(Math.random() * others.length)];
    this.setTarget(target.x + (Math.random() > 0.5 ? 8 : -8), target.y);
    this._nextState = 'chatting';
    this.bubble = '💬';
    this.bubbleTimer = 2;
  }

  goToMeeting(spot) {
    this.setTarget(spot.x, spot.y);
    this._nextState = 'meeting';
  }

  update(dt) {
    this.bobPhase += dt * 2;
    this.animTimer += dt;

    // Bubble timer
    if (this.bubbleTimer > 0) {
      this.bubbleTimer -= dt;
      if (this.bubbleTimer <= 0) this.bubble = null;
    }

    switch (this.state) {
      case 'walking': {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 1.5) {
          this.x = this.targetX;
          this.y = this.targetY;
          this.state = this._nextState || 'idle';
          this.stateTimer = 3 + Math.random() * 6;
          if (this.state === 'working' || this.state === 'stressed') {
            // Snap to chair
            this.x = this.desk.x + chairOffset.x;
            this.y = this.desk.y + chairOffset.y;
          }
        } else {
          const speed = this.type.speed * 20 * dt;
          this.x += (dx / dist) * speed;
          this.y += (dy / dist) * speed;
          if (dx > 0.5) this.facing = 'r';
          else if (dx < -0.5) this.facing = 'l';
          // Walk animation
          if (this.animTimer > 0.2) {
            this.animFrame = 1 - this.animFrame;
            this.animTimer = 0;
          }
        }
        break;
      }

      case 'working': {
        this.stateTimer -= dt;
        // Occasional typing bubble
        if (Math.random() < 0.002) {
          this.bubble = ['💻','📊','📈','🔍','📋'][Math.floor(Math.random()*5)];
          this.bubbleTimer = 1.5;
        }
        if (this.stateTimer <= 0) {
          this.decideNextAction();
        }
        break;
      }

      case 'stressed': {
        this.stateTimer -= dt;
        if (Math.random() < 0.005) {
          this.bubble = ['❗','😰','🐛','💥'][Math.floor(Math.random()*4)];
          this.bubbleTimer = 1.5;
        }
        if (this.stateTimer <= 0) {
          // Stressed agents occasionally get coffee or pace
          if (Math.random() < 0.3) {
            this.goToCoffee();
          } else if (Math.random() < 0.3) {
            this.goToWander();
            this._nextState = 'stressed_return';
          } else {
            this.stateTimer = 3 + Math.random() * 4;
          }
        }
        break;
      }

      case 'stressed_return': {
        this.stateTimer -= dt;
        if (this.stateTimer <= 0) {
          this.goToDesk();
          this._nextState = 'stressed';
        }
        break;
      }

      case 'idle': {
        this.stateTimer -= dt;
        if (this.stateTimer <= 0) this.decideNextAction();
        break;
      }

      case 'coffee': {
        this.stateTimer -= dt;
        // Steam particles
        if (Math.random() < 0.05) {
          addParticle(this.x + 3 + Math.random()*4, this.y - 2, 'steam', 1.5);
        }
        if (this.stateTimer <= 0) {
          this.bubble = null;
          this.goToDesk();
        }
        break;
      }

      case 'chatting': {
        this.stateTimer -= dt;
        if (Math.random() < 0.01) {
          this.bubble = ['😄','👋','🤝','💡','📱'][Math.floor(Math.random()*5)];
          this.bubbleTimer = 1;
        }
        if (this.stateTimer <= 0) {
          this.bubble = null;
          this.goToDesk();
        }
        break;
      }

      case 'meeting': {
        // Stay until scrum ends
        if (!scrumActive) {
          this.goToDesk();
        }
        if (Math.random() < 0.005) {
          this.bubble = ['📋','🗣️','📊','✅','🤔'][Math.floor(Math.random()*5)];
          this.bubbleTimer = 1.5;
        }
        break;
      }
    }
  }

  decideNextAction() {
    if (scrumActive) return; // Don't wander during scrum
    const rand = Math.random();
    if (rand < this.type.deskTime) {
      this.goToDesk();
    } else if (rand < this.type.deskTime + this.type.coffeeFreq * 0.5) {
      this.goToCoffee();
    } else if (rand < this.type.deskTime + this.type.coffeeFreq * 0.5 + this.type.social * 0.3) {
      this.goToChat();
    } else {
      this.goToWander();
    }
  }

  getSpriteName() {
    if (this.state === 'walking') {
      return (this.animFrame === 0 ? 'walk1' : 'walk2') + '_' + this.facing;
    }
    if (this.state === 'working' || this.state === 'meeting') {
      return 'sit_' + this.facing;
    }
    if (this.state === 'stressed' || this.state === 'stressed_return') {
      return 'stress_' + this.facing;
    }
    return 'stand_' + this.facing;
  }

  draw() {
    const spriteName = this.getSpriteName();
    const sprite = this.sprites[spriteName];
    if (!sprite) return;

    // Idle bob
    let bobY = 0;
    if (this.state === 'idle' || this.state === 'chatting' || this.state === 'coffee') {
      bobY = Math.sin(this.bobPhase) * 0.5;
    }

    const sx = Math.round(this.x * PX);
    const sy = Math.round((this.y + bobY) * PX);
    ctx.drawImage(sprite, sx, sy);

    // Error exclamation mark
    if (this.jobStatus === 'error') {
      const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ff3333';
      // Exclamation mark above head
      ctx.fillRect(sx + 4*PX, sy - 6*PX, 2*PX, 3*PX);
      ctx.fillRect(sx + 4*PX, sy - 2*PX, 2*PX, PX);
      ctx.globalAlpha = 1;
    }

    // Bubble
    if (this.bubble && this.bubbleTimer > 0) {
      const bubbleAlpha = Math.min(1, this.bubbleTimer);
      ctx.globalAlpha = bubbleAlpha;
      ctx.font = `${PX * 3}px sans-serif`;
      ctx.fillText(this.bubble, sx + 6*PX, sy - 4*PX);
      ctx.globalAlpha = 1;
    }

    // Name label on hover
    if (this === hoveredAgent) {
      ctx.fillStyle = '#000000aa';
      const tw = ctx.measureText(this.name).width;
      ctx.fillRect(sx - 4, sy - 14*PX, tw + 8, 14);
      ctx.fillStyle = '#e0e0f0';
      ctx.font = '10px sans-serif';
      ctx.fillText(this.name, sx, sy - 14*PX + 11);
    }
  }

  containsPoint(gx, gy) {
    return gx >= this.x && gx <= this.x + 10 && gy >= this.y - 2 && gy <= this.y + 14;
  }
}

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
let hoveredAgent = null;
let selectedAgent = null;
let lastTime = 0;

function callScrum() {
  if (scrumActive) {
    // End scrum
    scrumActive = false;
    document.getElementById('scrum-btn').textContent = 'CALL SCRUM';
    document.getElementById('scrum-btn').classList.remove('active');
    agents.forEach(a => {
      if (a.state === 'meeting') a.goToDesk();
    });
    return;
  }
  scrumActive = true;
  scrumTimer = 0;
  document.getElementById('scrum-btn').textContent = 'END SCRUM';
  document.getElementById('scrum-btn').classList.add('active');
  agents.forEach((a, i) => {
    const spot = MEETING_SPOTS[i % MEETING_SPOTS.length];
    setTimeout(() => a.goToMeeting(spot), i * 150 / gameSpeed);
  });
}

function sendCoffeeBreak() {
  agents.forEach((a, i) => {
    if (a.state !== 'meeting') {
      setTimeout(() => {
        a.goToCoffee();
      }, i * 200 / gameSpeed);
    }
  });
}

function setSpeed(s) {
  gameSpeed = s;
  document.querySelectorAll('.speed-ctrl button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// INFO PANEL
// ═══════════════════════════════════════════════════
function showInfo(agent) {
  selectedAgent = agent;
  const d = agent.data;
  const t = agent.type;
  const statusClass = d.status === 'error' ? 'err-text' : d.status === 'completed' ? 'ok-text' : '';

  function cronToHuman(expr) {
    if (!expr || expr === '?') return 'No schedule';
    const parts = expr.split(' ');
    if (parts.length < 5) return expr;
    const [min, hr, , , dow] = parts;
    const days = {'*':'Daily','1-5':'Weekdays','1,3,5':'Mon/Wed/Fri','2,4':'Tue/Thu','1':'Mondays','3':'Wednesdays','4':'Thursdays'};
    const dayStr = days[dow] || dow;
    const hour = parseInt(hr);
    const ampm = hour >= 12 ? 'PM' : 'AM';
    const h12 = hour > 12 ? hour - 12 : hour === 0 ? 12 : hour;
    return `${dayStr} ${h12}:${min.padStart(2,'0')}${ampm}`;
  }

  document.getElementById('info-body').innerHTML = `
    <div class="info-sprite"><canvas id="info-sprite-canvas" width="60" height="84"></canvas></div>
    <h3>${d.name}</h3>
    <div class="info-row"><span class="k">Role</span><span class="v">${t.label}</span></div>
    <div class="info-row"><span class="k">Status</span><span class="v ${statusClass}">${d.status.toUpperCase()}</span></div>
    <div class="info-row"><span class="k">Category</span><span class="v">${d.category}</span></div>
    <div class="info-row"><span class="k">Schedule</span><span class="v">${cronToHuman(d.schedule)}</span></div>
    <div class="info-row"><span class="k">Cron</span><span class="v" style="font-family:monospace;font-size:11px">${d.schedule}</span></div>
    <div class="info-row"><span class="k">Last Run</span><span class="v">${d.lastRunTime || 'Never'}</span></div>
    <div class="info-row"><span class="k">Next Run</span><span class="v">${d.nextRunTime || 'Unknown'}</span></div>
    <div class="info-row"><span class="k">Duration</span><span class="v">${d.durationMs ? (d.durationMs/1000).toFixed(1) + 's' : '-'}</span></div>
    <div class="info-row"><span class="k">Errors</span><span class="v ${d.consecutiveErrors > 0 ? 'err-text' : 'ok-text'}">${d.consecutiveErrors}</span></div>
    <div class="info-row"><span class="k">Output</span><span class="v" style="font-size:10px;word-break:break-all">${d.outputFile || 'None'}</span></div>
    <div class="info-row"><span class="k">Doing</span><span class="v">${agent.state}</span></div>
    <div class="personality"><b>${t.label}:</b> ${t.personality}</div>
  `;
  document.getElementById('info').classList.add('open');

  // Draw large sprite in info panel
  const ic = document.getElementById('info-sprite-canvas');
  const ictx = ic.getContext('2d');
  ictx.imageSmoothingEnabled = false;
  const sprite = agent.sprites['stand_r'];
  if (sprite) ictx.drawImage(sprite, 0, 0, sprite.width, sprite.height, 5, 2, 50, 70);
}

function closeInfo() {
  document.getElementById('info').classList.remove('open');
  selectedAgent = null;
}

// ═══════════════════════════════════════════════════
// AMBIENT EFFECTS
// ═══════════════════════════════════════════════════
let coffeeSteamTimer = 0;
let clockAngle = 0;

function updateAmbient(dt) {
  // Coffee machine steam
  coffeeSteamTimer += dt;
  if (coffeeSteamTimer > 0.4) {
    coffeeSteamTimer = 0;
    addParticle(COFFEE_MACHINE.x + 2 + Math.random()*4, COFFEE_MACHINE.y - 1, 'steam', 2);
  }
  clockAngle += dt * 0.5;
}

function drawAmbientOverlays() {
  // Monitor glow on occupied desks
  for (const agent of agents) {
    if (agent.state === 'working' || agent.state === 'stressed') {
      const d = agent.desk;
      const pulse = 0.15 + Math.sin(Date.now()/1000 + agent.index) * 0.05;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = agent.jobStatus === 'error' ? '#ff2020' : '#2060ff';
      ctx.fillRect((d.x + 3) * PX, (d.y) * PX, 8 * PX, 6 * PX);
      ctx.globalAlpha = 1;
    }
  }

  // Clock hands (update)
  const cx = 174 * PX, cy = 7.5 * PX;
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(clockAngle) * 6, cy + Math.sin(clockAngle) * 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(clockAngle * 12) * 4, cy + Math.sin(clockAngle * 12) * 4);
  ctx.stroke();

  // Scrum active indicator
  if (scrumActive) {
    ctx.globalAlpha = 0.3 + Math.sin(Date.now()/500) * 0.1;
    ctx.fillStyle = '#c084fc';
    ctx.fillRect(MEETING_ROOM.x * PX, MEETING_ROOM.y * PX, MEETING_ROOM.w * PX, MEETING_ROOM.h * PX);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#c084fc';
    ctx.font = "bold 14px 'Press Start 2P', monospace";
    ctx.fillText('SCRUM', (MEETING_ROOM.x + 12) * PX, (MEETING_ROOM.y + MEETING_ROOM.h + 8) * PX);
  }
}

// ═══════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════
function screenToGame(sx, sy) {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas._scale || 1;
  return {
    x: (sx - rect.left) / scale / PX,
    y: (sy - rect.top) / scale / PX
  };
}

canvas.addEventListener('mousemove', (e) => {
  const { x, y } = screenToGame(e.clientX, e.clientY);
  hoveredAgent = null;
  // Check agents in reverse (top-drawn last)
  const sorted = [...agents].sort((a, b) => b.y - a.y);
  for (const agent of sorted) {
    if (agent.containsPoint(x, y)) {
      hoveredAgent = agent;
      canvas.style.cursor = 'pointer';
      // Tooltip
      const tt = document.getElementById('tooltip');
      tt.style.display = 'block';
      tt.textContent = agent.name;
      tt.style.left = (e.clientX - canvas.getBoundingClientRect().left + 15) + 'px';
      tt.style.top = (e.clientY - canvas.getBoundingClientRect().top - 10) + 'px';
      return;
    }
  }
  canvas.style.cursor = 'default';
  document.getElementById('tooltip').style.display = 'none';
});

canvas.addEventListener('click', (e) => {
  const { x, y } = screenToGame(e.clientX, e.clientY);
  for (const agent of [...agents].sort((a, b) => b.y - a.y)) {
    if (agent.containsPoint(x, y)) {
      showInfo(agent);
      return;
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredAgent = null;
  document.getElementById('tooltip').style.display = 'none';
});

// ═══════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════
function updateStats() {
  const total = agents.length;
  const ok = agents.filter(a => a.jobStatus === 'completed').length;
  const err = agents.filter(a => a.jobStatus === 'error').length;
  const idle = agents.filter(a => a.jobStatus === 'idle').length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-err').textContent = err;
  document.getElementById('s-idle').textContent = idle;
}

// ═══════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════
function gameLoop(timestamp) {
  const rawDt = lastTime ? (timestamp - lastTime) / 1000 : 0.016;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 0.05) * gameSpeed;

  // Update
  for (const a of agents) a.update(dt);
  updateParticles(dt);
  updateAmbient(dt);

  // Render
  ctx.drawImage(bgCanvas, 0, 0);
  drawAmbientOverlays();

  // Sort agents by Y for painter's algorithm
  const sorted = [...agents].sort((a, b) => a.y - b.y);
  for (const a of sorted) a.draw();

  drawParticles();

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════
async function init() {
  resizeCanvas();
  drawBg();

  try {
    const res = await fetch('data/agents-data.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      agents = data.map((d, i) => new Agent(d, i));
    }
  } catch (e) {
    console.error('Failed to load agent data:', e);
  }

  updateStats();

  // Stagger initial agent states for variety
  agents.forEach((a, i) => {
    a.stateTimer = 1 + Math.random() * 8;
    // Some agents start idle/wandering for visual variety
    if (a.jobStatus !== 'error' && Math.random() < 0.3) {
      setTimeout(() => a.goToWander(), i * 300);
    }
    if (a.jobStatus !== 'error' && Math.random() < 0.15) {
      setTimeout(() => a.goToCoffee(), i * 400 + 1000);
    }
  });

  requestAnimationFrame(gameLoop);
}

init();
</script>
