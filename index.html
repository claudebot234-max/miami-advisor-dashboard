<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miami Advisory Intelligence Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(15, 23, 42, 0.95);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid rgba(100, 200, 255, 0.1);
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .meta {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.1);
        }
        .stat-card h3 {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #60a5fa;
        }
        .section {
            background: rgba(15, 23, 42, 0.95);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid rgba(100, 200, 255, 0.1);
        }
        .section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #60a5fa;
        }
        .lead-card {
            background: rgba(30, 41, 59, 0.5);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #3b82f6;
        }
        .lead-card.hot { border-left-color: #ef4444; }
        .lead-card.warm { border-left-color: #f59e0b; }
        .lead-card.cold { border-left-color: #6b7280; }
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        .lead-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #e2e8f0;
        }
        .heat-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .heat-badge.hot { background: #ef4444; color: white; }
        .heat-badge.warm { background: #f59e0b; color: white; }
        .heat-badge.cold { background: #6b7280; color: white; }
        .lead-detail {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .lead-detail strong { color: #cbd5e1; }
        .opening-line {
            background: rgba(59, 130, 246, 0.1);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            font-style: italic;
            color: #cbd5e1;
        }
        .source-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .source-link:hover { text-decoration: underline; }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #2563eb; }
        .empty { color: #64748b; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💼 Miami Advisory Intelligence Dashboard</h1>
            <div class="meta">
                Last updated: <span id="lastUpdated">Loading...</span> |
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Wealth Trigger Leads</h3>
                <div class="value" id="statLeads">-</div>
            </div>
            <div class="stat-card">
                <h3>CPA Targets</h3>
                <div class="value" id="statCPA">-</div>
            </div>
            <div class="stat-card">
                <h3>Practice Acquisitions</h3>
                <div class="value" id="statAcquisitions">-</div>
            </div>
            <div class="stat-card">
                <h3>VUL Prospects</h3>
                <div class="value" id="statVUL">-</div>
            </div>
        </div>

        <div class="section" id="leadsSection"></div>
        <div class="section" id="cpaSection"></div>
        <div class="section" id="acquisitionsSection"></div>
        <div class="section" id="vulSection"></div>
        <div class="section" id="businessSalesSection"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Update stats
                document.getElementById('statLeads').textContent = data.summary.totalLeads;
                document.getElementById('statCPA').textContent = data.summary.totalCPATargets;
                document.getElementById('statAcquisitions').textContent = data.summary.totalPracticeAcquisitions;
                document.getElementById('statVUL').textContent = data.summary.totalVULProspects;
                document.getElementById('lastUpdated').textContent = new Date(data.lastUpdated).toLocaleString();
                
                // Render Leads
                document.getElementById('leadsSection').innerHTML = `
                    <h2>🎯 Wealth Trigger Leads (${data.leads.date})</h2>
                    ${data.leads.items.map(lead => `
                        <div class="lead-card ${lead.heat.toLowerCase()}">
                            <div class="lead-header">
                                <div class="lead-title">${lead.trigger}</div>
                                <span class="heat-badge ${lead.heat.toLowerCase()}">${lead.heat}</span>
                            </div>
                            ${lead.name ? `<div class="lead-detail"><strong>Contact:</strong> ${lead.name}</div>` : ''}
                            <div class="lead-detail"><strong>Signal:</strong> ${lead.wealthSignal}</div>
                            <div class="lead-detail"><strong>Reachability:</strong> ${lead.reachability}</div>
                            <div class="lead-detail"><strong>Category:</strong> ${lead.category}</div>
                            <div class="opening-line">"${lead.openingLine}"</div>
                            <div class="lead-detail" style="margin-top: 1rem;">
                                <a href="${lead.source}" class="source-link" target="_blank">Source →</a>
                            </div>
                        </div>
                    `).join('')}
                `;
                
                // Render CPA Targets
                document.getElementById('cpaSection').innerHTML = `
                    <h2>🤝 CPA Partnership Targets (${data.cpaTargets.date})</h2>
                    ${data.cpaTargets.items.map(cpa => `
                        <div class="lead-card ${cpa.heat.toLowerCase()}">
                            <div class="lead-header">
                                <div class="lead-title">${cpa.firmName}</div>
                                <span class="heat-badge ${cpa.heat.toLowerCase()}">${cpa.heat}</span>
                            </div>
                            ${cpa.contact ? `<div class="lead-detail"><strong>Contact:</strong> ${cpa.contact}</div>` : ''}
                            <div class="lead-detail"><strong>Location:</strong> ${cpa.location}</div>
                            ${cpa.phone ? `<div class="lead-detail"><strong>Phone:</strong> ${cpa.phone}</div>` : ''}
                            ${cpa.email ? `<div class="lead-detail"><strong>Email:</strong> ${cpa.email}</div>` : ''}
                            <div class="lead-detail"><strong>Specialty:</strong> ${cpa.specialty}</div>
                            <div class="lead-detail"><strong>Why No Advisor:</strong> ${cpa.whyNoAdvisor}</div>
                            <div class="opening-line">${cpa.linkedInOpener}</div>
                            <div class="lead-detail" style="margin-top: 1rem;">
                                <a href="${cpa.website}" class="source-link" target="_blank">Website →</a>
                            </div>
                        </div>
                    `).join('')}
                `;
                
                // Render Practice Acquisitions
                document.getElementById('acquisitionsSection').innerHTML = `
                    <h2>📊 Practice Acquisition Targets (${data.practiceAcquisitions.date})</h2>
                    ${data.practiceAcquisitions.items.map(acq => `
                        <div class="lead-card ${acq.heat.toLowerCase()}">
                            <div class="lead-header">
                                <div class="lead-title">${acq.name} - ${acq.firm}</div>
                                <span class="heat-badge ${acq.heat.toLowerCase()}">${acq.heat}</span>
                            </div>
                            <div class="lead-detail"><strong>Location:</strong> ${acq.location}</div>
                            ${acq.aum ? `<div class="lead-detail"><strong>AUM:</strong> ${acq.aum}</div>` : ''}
                            ${acq.avgClientBalance ? `<div class="lead-detail"><strong>Avg Client Balance:</strong> ${acq.avgClientBalance}</div>` : ''}
                            <div class="lead-detail"><strong>Retirement Signal:</strong> ${acq.retirementSignal}</div>
                            <div class="opening-line"><strong>Email Subject:</strong> ${acq.coldEmailSubject}</div>
                            <div class="opening-line">${acq.coldEmailOpener}</div>
                            <div class="lead-detail" style="margin-top: 1rem;">
                                <a href="${acq.secIAPD}" class="source-link" target="_blank">SEC IAPD →</a>
                            </div>
                        </div>
                    `).join('')}
                `;
                
                // Render VUL Prospects
                document.getElementById('vulSection').innerHTML = `
                    <h2>💰 VUL Sales Opportunities (${data.vulProspects.date})</h2>
                    ${data.vulProspects.items.map(vul => `
                        <div class="lead-card ${vul.heat.toLowerCase()}">
                            <div class="lead-header">
                                <div class="lead-title">${vul.name || vul.trigger}</div>
                                <span class="heat-badge ${vul.heat.toLowerCase()}">${vul.heat}</span>
                            </div>
                            <div class="lead-detail"><strong>Category:</strong> ${vul.category}</div>
                            <div class="lead-detail"><strong>Trigger:</strong> ${vul.trigger}</div>
                            <div class="lead-detail"><strong>Profile:</strong> ${vul.profile}</div>
                            <div class="opening-line"><strong>Approach:</strong> ${vul.approach}</div>
                            ${vul.source ? `<div class="lead-detail" style="margin-top: 1rem;"><a href="${vul.source}" class="source-link" target="_blank">Source →</a></div>` : ''}
                        </div>
                    `).join('')}
                `;
                
                // Render Business Sales (if exists)
                if (data.businessSales && data.businessSales.items) {
                    document.getElementById('businessSalesSection').innerHTML = `
                        <h2>🏢 Business Sales Opportunities (${data.businessSales.date})</h2>
                        <div style="color: #94a3b8; margin-bottom: 1rem; font-style: italic;">
                            ${data.businessSales.note}
                        </div>
                        ${data.businessSales.items.map(biz => `
                            <div class="lead-card warm">
                                <div class="lead-header">
                                    <div class="lead-title">${biz.listing}</div>
                                </div>
                                <div class="lead-detail"><strong>Signal:</strong> ${biz.signal}</div>
                                <div class="lead-detail"><strong>Opportunity:</strong> ${biz.opportunity}</div>
                                <div class="opening-line"><strong>Approach:</strong> ${biz.approach}</div>
                                <div class="lead-detail" style="margin-top: 1rem;">
                                    <a href="${biz.source}" class="source-link" target="_blank">Source →</a>
                                </div>
                            </div>
                        `).join('')}
                    `;
                }
                
                console.log('✅ Dashboard loaded successfully');
            } catch (error) {
                console.error('❌ Failed to load data:', error);
                document.body.innerHTML += '<div class="empty">❌ Failed to load data.json</div>';
            }
        }
        
        // Load on page load
        loadData();
    </script>
</body>
</html>
