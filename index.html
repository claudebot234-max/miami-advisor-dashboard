<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami Advisor AI - Business Development System</title>
<style>
:root { --bg: #0f1117; --surface: #1a1d24; --surface2: #22262e; --border: #2a2d35; --text: #e4e4e7; --muted: #71717a; --accent: #4f8ef7; --success: #34d399; --warning: #fbbf24; --danger: #f87171; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 1rem 0; position: fixed; height: 100vh; overflow-y: auto; }
.logo { padding: 1rem 1.25rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
.logo h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
.logo p { font-size: 12px; color: var(--muted); margin-top: 4px; }
.nav-section { padding: 0.5rem 0; }
.nav-section-title { font-size: 10px; text-transform: uppercase; color: var(--muted); padding: 0.5rem 1.25rem; letter-spacing: 0.5px; }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 1.25rem; background: none; border: none; cursor: pointer; text-align: left; font-size: 13px; color: var(--muted); transition: all 0.15s; }
.nav-btn:hover { background: rgba(79,142,247,0.08); color: var(--text); }
.nav-btn.active { background: rgba(79,142,247,0.15); color: var(--accent); border-right: 2px solid var(--accent); }
.nav-btn .icon { width: 18px; text-align: center; }
.nav-btn .count { font-size: 11px; background: var(--surface2); padding: 2px 8px; border-radius: 10px; margin-left: auto; }
.main { flex: 1; margin-left: 240px; padding: 1.5rem 2rem; min-height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.header h2 { font-size: 22px; font-weight: 500; }
.header-actions { display: flex; gap: 10px; }
.btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #3d7de5; }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--surface); border-color: var(--muted); }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.1); }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
.stat { background: var(--surface); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border); }
.stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.stat-value { font-size: 28px; font-weight: 600; margin-top: 8px; }
.stat-value.blue { color: var(--accent); }
.stat-value.green { color: var(--success); }
.stat-value.yellow { color: var(--warning); }
.stat-change { font-size: 12px; color: var(--success); margin-top: 4px; }
.filters { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.filters input, .filters select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; }
.filters input { flex: 1; min-width: 200px; }
.filters input:focus, .filters select:focus { outline: none; border-color: var(--accent); }
.lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; transition: all 0.15s; }
.lead-card:hover { border-color: var(--muted); }
.lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.lead-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.lead-meta { font-size: 13px; color: var(--muted); }
.lead-details { font-size: 13px; color: var(--muted); margin: 12px 0; line-height: 1.6; }
.lead-approach { font-size: 13px; color: var(--accent); margin: 12px 0; padding: 10px 14px; background: rgba(79,142,247,0.08); border-radius: 8px; border-left: 3px solid var(--accent); }
.lead-aum { font-size: 14px; font-weight: 500; margin: 8px 0; }
.lead-aum span { color: var(--success); }
.badge { font-size: 11px; padding: 5px 12px; border-radius: 20px; text-transform: capitalize; font-weight: 500; }
.badge-new { background: rgba(96,165,250,0.15); color: #60a5fa; }
.badge-contacted { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge-meeting { background: rgba(52,211,153,0.15); color: #34d399; }
.badge-client { background: rgba(192,132,252,0.15); color: #c084fc; }
.actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.actions button { font-size: 12px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; }
.actions button:hover { background: var(--surface2); border-color: var(--muted); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--surface); padding: 1.5rem; border-radius: 16px; width: 480px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
.modal h3 { margin-bottom: 1.25rem; font-size: 18px; font-weight: 500; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }
.empty p { font-size: 15px; }
.refresh-note { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 1rem; }
.source-filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.source-chip { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-weight: 500; }
.source-chip:hover { border-color: var(--accent); color: var(--text); }
.source-chip.active { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }
.source-chip .chip-count { font-size: 10px; opacity: 0.7; margin-left: 4px; }
.source-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--muted); margin-left: 8px; font-weight: 500; vertical-align: middle; }
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<div class="logo"><h1>Miami Advisor AI</h1><p>Business Development System</p><a href="pixel-agents.html" style="display:block;margin-top:10px;font-size:11px;color:#c084fc;text-decoration:none;padding:6px 10px;border:1px solid #2a2d35;border-radius:6px;text-align:center;transition:all 0.15s;" onmouseover="this.style.borderColor='#c084fc'" onmouseout="this.style.borderColor='#2a2d35'">&#9632; Pixel Agents</a></div>
<div class="nav-section">
<div class="nav-section-title">Intelligence</div>
<div id="nav"></div>
</div>
</div>
<div class="main">
<div class="header">
<h2 id="section-title">Lead Radar</h2>
<div class="header-actions">
<button class="btn btn-secondary" onclick="refreshData()">↻ Refresh</button>
<button class="btn btn-secondary" onclick="exportCSV()">↓ Export CSV</button>
<button class="btn btn-primary" onclick="openAddModal()">+ Add Lead</button>
</div>
</div>
<div class="refresh-note">Last updated: <span id="last-update">-</span></div>
<div class="stats" id="stats"></div>
<div class="filters">
<input type="text" id="search" placeholder="Search by name, company, or details..." oninput="render()">
<select id="status-filter" onchange="render()">
<option value="all">All Status</option>
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="meeting">Meeting Scheduled</option>
<option value="client">Client</option>
</select>
</div>
<div id="leads"></div>
</div>
</div>
<div id="modal"></div>

<script>
const SECTIONS = [
  {id:'lead-radar',name:'Lead Radar',icon:'📡'},
  {id:'acquisition',name:'Acquisition Targets',icon:'🎯'},
  {id:'vul',name:'VUL Prospects',icon:'💼'},
  {id:'indian-network',name:'Indian Network',icon:'🇮🇳'},
  {id:'cpa-partners',name:'CPA Partners',icon:'📊'},
  {id:'estate-attorneys',name:'Estate Attorneys',icon:'⚖️'},
  {id:'warm-intros',name:'Warm Intros',icon:'🤝'},
  {id:'divorce-leads',name:"Ryan's Referrals",icon:'💔'},
  {id:'divorce-monitor',name:'Divorce Leads',icon:'💍'},
  {id:'filly-bookings',name:'Filly Bookings',icon:'📞'}
];

let activeSection = 'lead-radar';
let activeSource = 'all';
let leads = [];

// Load from localStorage first, then try to fetch from GitHub
async function init() {
  await fetchLeadsFromGitHub();
  // Merge any manually added leads from localStorage
  const stored = localStorage.getItem('mai-manual-leads');
  if (stored) {
    const manual = JSON.parse(stored);
    manual.forEach(m => {
      if (!leads.find(l => l.id === m.id)) leads.push(m);
    });
  }
  // Filter out deleted leads
  const deleted = localStorage.getItem('mai-deleted-ids');
  if (deleted) {
    const delIds = JSON.parse(deleted);
    leads = leads.filter(l => !delIds.includes(l.id));
  }
  // Apply status changes
  const statuses = localStorage.getItem('mai-status-changes');
  if (statuses) {
    const statusMap = JSON.parse(statuses);
    leads = leads.map(l => statusMap[l.id] ? {...l, status: statusMap[l.id]} : l);
  }
  render();
}

async function fetchLeadsFromGitHub() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/claudebot234-max/miami-advisor-dashboard/main/data/leads-data.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        leads = data;
        localStorage.setItem('mai-leads-v2', JSON.stringify(leads));
        document.getElementById('last-update').textContent = new Date().toLocaleString();
        render();
      }
    }
  } catch (e) {
    console.log('Using cached data');
  }
}

function refreshData() {
  fetchLeadsFromGitHub();
}

function saveManual() {
  localStorage.setItem("mai-manual", JSON.stringify(manualLeads));
  localStorage.setItem("mai-deleted", JSON.stringify(deletedIds));
  localStorage.setItem("mai-status", JSON.stringify(statusChanges));
}

function save() {
  localStorage.setItem('mai-leads-v2', JSON.stringify(leads));
}

function fmt(n) {
  if (!n) return '$0';
  return n >= 1e6 ? '$' + (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? '$' + (n/1e3).toFixed(0) + 'K' : '$' + n;
}

function renderNav() {
  const counts = {};
  SECTIONS.forEach(s => counts[s.id] = leads.filter(l => l.section === s.id).length);
  document.getElementById('nav').innerHTML = SECTIONS.map(s => 
    `<button class="nav-btn ${activeSection === s.id ? 'active' : ''}" onclick="setSection('${s.id}')">
      <span class="icon">${s.icon}</span>
      <span>${s.name}</span>
      ${counts[s.id] ? `<span class="count">${counts[s.id]}</span>` : ''}
    </button>`
  ).join('');
}

function setSection(id) {
  activeSection = id;
  activeSource = 'all';
  document.getElementById('section-title').textContent = SECTIONS.find(s => s.id === id)?.name || id;
  render();
}

function setSource(src) {
  activeSource = src;
  render();
}

function render() {
  renderNav();
  const search = document.getElementById('search').value.toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;
  
  const sectionLeads = leads.filter(l => l.section === activeSection);

  // Source sub-filter chips
  const sources = [...new Set(sectionLeads.map(l => l.source).filter(Boolean))];
  let sourceHTML = '';
  if (sources.length > 1) {
    const allCount = sectionLeads.length;
    sourceHTML = `<div class="source-filters">
      <span class="source-chip ${activeSource === 'all' ? 'active' : ''}" onclick="setSource('all')">All<span class="chip-count">(${allCount})</span></span>
      ${sources.map(src => {
        const c = sectionLeads.filter(l => l.source === src).length;
        return `<span class="source-chip ${activeSource === src ? 'active' : ''}" onclick="setSource('${src}')">${src}<span class="chip-count">(${c})</span></span>`;
      }).join('')}
    </div>`;
  }

  const filtered = leads.filter(l => {
    if (l.section !== activeSection) return false;
    if (activeSource !== 'all' && (l.source || '') !== activeSource) return false;
    if (statusFilter !== 'all' && l.status !== statusFilter) return false;
    if (search && !((l.name || '').toLowerCase().includes(search) ||
                    (l.company || '').toLowerCase().includes(search) ||
                    (l.title || '').toLowerCase().includes(search) ||
                    (l.details || '').toLowerCase().includes(search))) return false;
    return true;
  });
  const totalAUM = sectionLeads.reduce((s, l) => s + (l.aum || 0), 0);
  const newCount = sectionLeads.filter(l => l.status === 'new').length;
  const meetingCount = sectionLeads.filter(l => l.status === 'meeting').length;
  const clientCount = sectionLeads.filter(l => l.status === 'client').length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Leads</div>
      <div class="stat-value">${sectionLeads.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Potential AUM</div>
      <div class="stat-value blue">${fmt(totalAUM)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">New Leads</div>
      <div class="stat-value yellow">${newCount}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Meetings / Clients</div>
      <div class="stat-value green">${meetingCount} / ${clientCount}</div>
    </div>`;
  
  if (!filtered.length) {
    document.getElementById('leads').innerHTML = sourceHTML + `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <p>No leads${activeSource !== 'all' ? ' from ' + activeSource : ' in this section'} yet.</p>
        <p style="margin-top: 8px;">Click "+ Add Lead" to create one, or wait for cron jobs to populate data.</p>
      </div>`;
    return;
  }
  
  document.getElementById('leads').innerHTML = sourceHTML + filtered.map(l => `
    <div class="lead-card">
      <div class="lead-header">
        <div>
          <div class="lead-title">${l.title || l.name || 'Untitled Lead'}${l.source && sources.length > 1 ? `<span class="source-badge">${l.source}</span>` : ''}</div>
          <div class="lead-meta">${l.name || ''}${l.company ? ' · ' + l.company : ''}</div>
        </div>
        <span class="badge badge-${l.status || 'new'}">${l.status || 'new'}</span>
      </div>
      ${l.details ? `<div class="lead-details">${l.details.replace(/\n/g, '<br>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/✅/g, '<span style="color:#34d399">✅</span>')}</div>` : ''}
      ${l.approach ? `<div class="lead-approach">💡 ${l.approach}</div>` : ''}
      ${l.aum ? `<div class="lead-aum">Estimated AUM: <span>${fmt(l.aum)}</span></div>` : ''}
      <div class="actions">
        ${l.status === 'new' ? `<button onclick="updateStatus(${l.id},'contacted')">📞 Mark Contacted</button>` : ''}
        ${l.status === 'contacted' ? `<button onclick="updateStatus(${l.id},'meeting')">📅 Schedule Meeting</button>` : ''}
        ${l.status === 'meeting' ? `<button onclick="updateStatus(${l.id},'client')">✅ Convert to Client</button>` : ''}
        <button onclick="editLead(${l.id})">✏️ Edit</button>
        <button onclick="deleteLead(${l.id})" style="color: var(--danger);">🗑️ Delete</button>
      </div>
    </div>`).join('');
}

function updateStatus(id, status) {
  leads = leads.map(l => l.id === id ? {...l, status} : l);
  // Save status change to localStorage
  const stored = localStorage.getItem('mai-status-changes');
  const statusMap = stored ? JSON.parse(stored) : {};
  statusMap[id] = status;
  localStorage.setItem('mai-status-changes', JSON.stringify(statusMap));
  save();
  render();
}

function deleteLead(id) {
  if (confirm('Delete this lead permanently?')) {
    leads = leads.filter(l => l.id !== id);
    // Save deletion to localStorage
    const stored = localStorage.getItem('mai-deleted-ids');
    const deleted = stored ? JSON.parse(stored) : [];
    deleted.push(id);
    localStorage.setItem('mai-deleted-ids', JSON.stringify(deleted));
    // Also remove from manual leads if present
    const manualStored = localStorage.getItem('mai-manual-leads');
    if (manualStored) {
      const manual = JSON.parse(manualStored).filter(l => l.id !== id);
      localStorage.setItem('mai-manual-leads', JSON.stringify(manual));
    }
    save();
    render();
  }
}

function editLead(id) {
  openAddModal(leads.find(l => l.id === id));
}

function openAddModal(lead = null) {
  document.getElementById('modal').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${lead ? 'Edit Lead' : 'Add New Lead'}</h3>
        <form onsubmit="saveLead(event, ${lead?.id || 'null'})">
          <div class="form-group">
            <label>Lead Title / Trigger Event *</label>
            <input id="f-title" value="${lead?.title || ''}" required placeholder="e.g., Sold company for $5M">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Contact Name</label>
              <input id="f-name" value="${lead?.name || ''}" placeholder="John Smith">
            </div>
            <div class="form-group">
              <label>Company</label>
              <input id="f-company" value="${lead?.company || ''}" placeholder="Acme Corp">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Estimated AUM ($)</label>
              <input type="number" id="f-aum" value="${lead?.aum || 0}" placeholder="1000000">
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="f-status">
                <option value="new" ${lead?.status === 'new' ? 'selected' : ''}>New</option>
                <option value="contacted" ${lead?.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                <option value="meeting" ${lead?.status === 'meeting' ? 'selected' : ''}>Meeting Scheduled</option>
                <option value="client" ${lead?.status === 'client' ? 'selected' : ''}>Client</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Details</label>
            <textarea id="f-details" placeholder="Background info, source, context...">${lead?.details || ''}</textarea>
          </div>
          <div class="form-group">
            <label>Suggested Approach</label>
            <textarea id="f-approach" placeholder="How to reach out, talking points...">${lead?.approach || ''}</textarea>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="f-notes" placeholder="Personal notes, follow-up reminders...">${lead?.notes || ''}</textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">${lead ? 'Save Changes' : 'Add Lead'}</button>
          </div>
        </form>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal').innerHTML = '';
}

function saveLead(e, id) {
  e.preventDefault();
  const data = {
    title: document.getElementById('f-title').value,
    name: document.getElementById('f-name').value,
    company: document.getElementById('f-company').value,
    aum: parseInt(document.getElementById('f-aum').value) || 0,
    status: document.getElementById('f-status').value,
    details: document.getElementById('f-details').value,
    approach: document.getElementById('f-approach').value,
    notes: document.getElementById('f-notes').value
  };
  
  if (id) {
    leads = leads.map(l => l.id === id ? {...l, ...data} : l);
    // Update in manual leads localStorage if it exists there
    const manualStored = localStorage.getItem('mai-manual-leads');
    if (manualStored) {
      const manual = JSON.parse(manualStored);
      const idx = manual.findIndex(l => l.id === id);
      if (idx >= 0) {
        manual[idx] = {...manual[idx], ...data};
        localStorage.setItem('mai-manual-leads', JSON.stringify(manual));
      }
    }
  } else {
    const newLead = {...data, id: Date.now(), section: activeSection};
    leads.push(newLead);
    // Save to manual leads localStorage
    const stored = localStorage.getItem('mai-manual-leads');
    const manual = stored ? JSON.parse(stored) : [];
    manual.push(newLead);
    localStorage.setItem('mai-manual-leads', JSON.stringify(manual));
  }
  
  save();
  closeModal();
  render();
}

function exportCSV() {
  const sectionLeads = leads.filter(l => l.section === activeSection);
  if (!sectionLeads.length) {
    alert('No leads to export');
    return;
  }
  
  const headers = ['Name', 'Title', 'Company', 'Status', 'AUM', 'Details', 'Approach'];
  const rows = sectionLeads.map(l => [
    l.name || '',
    l.title || '',
    l.company || '',
    l.status || 'new',
    l.aum || 0,
    (l.details || '').replace(/"/g, '""'),
    (l.approach || '').replace(/"/g, '""')
  ].map(v => `"${v}"`).join(','));
  
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${activeSection}-leads-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// Initialize
init();
</script>
</body>
</html>
